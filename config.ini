# 超星学习通考试限制解除器配置文件 (V6.3)
# 项目地址: https://github.com/your-username/chaoxing-exam-unlocker

[General]
# 主脚本文件
MainScript=chaoxing-exam-unlocker.user.js
# CSS限制解除已集成到主脚本中
CSSUnlocker=integrated

[Installation]
# 安装说明
# 1. 安装Tampermonkey浏览器扩展
# 2. 导入chaoxing-exam-unlocker.user.js文件
# 3. 访问超星学习通网站自动生效

[Compatibility]
# 兼容性说明
SupportedSites=*.chaoxing.com
TestedBrowsers=Chrome, Firefox, Edge
RequiredExtensions=Tampermonkey or Violentmonkey

[Features]
# V6.3 功能列表
F12DebuggerBypass=true
RootPrototypeHooking=true
TextSelectionUnlock=true
EventCaptureInterception=true
PasteRestrictionBypass=true
PrototypeChainHooking=true
EmergencyRescueModule=true
DynamicAjaxCleanup=true

[V6.3_Changes]
# V6.3 版本变更
RemovedGlobalFreeze=true
AddedEventCapture=true
AddedRescueButton=true
EnhancedDebuggerBypass=true
