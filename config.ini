# 超星学习通考试限制解除器配置文件
# 项目地址: https://github.com/your-username/chaoxing-exam-unlocker

[General]
# 主脚本文件
MainScript=chaoxing-exam-unlocker.user.js
# CSS限制解除脚本
CSSUnlocker=remove-notAllowCopy-css.user.js

[Installation]
# 安装说明
# 1. 安装Tampermonkey浏览器扩展
# 2. 导入chaoxing-exam-unlocker.user.js文件
# 3. 访问超星学习通网站自动生效

[Compatibility]
# 兼容性说明
SupportedSites=*.chaoxing.com
TestedBrowsers=Chrome, Firefox, Edge
RequiredExtensions=Tampermonkey or Violentmonkey

[Features]
# 功能列表
F12DebuggerBypass=true
TextSelectionUnlock=true
PasteRestrictionBypass=true
PrototypeChainHooking=true

[Version]
CurrentVersion=5.0
LastUpdated=2026-04-20

[Render]
AllowMeshShader=Enable
Capability=DirectX12
ForceMeshShader=Disable
ParallelBuildCommandList=Enable
ParallelBuildProcessorCount=8
RenderWorkerThreadPriorityAboveNormal=Disable
TightFitShaderCache=Enable
UseComputeQueuePairing=Enable
UsingIndepentRenderWorker=Enable

[RenderDeviceDirectX12]
EcoShaderCache=True
